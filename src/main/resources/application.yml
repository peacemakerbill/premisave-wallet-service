spring:
  application:
    name: premisave-wallet-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/premisave-wallet}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  cloud:
    discovery:
      enabled: false

server:
  port: 8084

# Auth Service Integration
auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8080}
    # Must match the API_KEY set in the auth service .env
    api-key: ${AUTH_SERVICE_API_KEY:replace-this-in-production}

# JWT Configuration (must match other services)
jwt:
  secret: ${JWT_SECRET:eW91ci12ZXJ5LXNlY3VyZS1qd3Qtc2VjcmV0LWtleS0zMi1ieXRlcyE=}

# Rate Limiting
rate-limit:
  requests-per-minute: 60

# ─── M-Pesa Daraja ────────────────────────────────────────────────────────────
mpesa:
  daraja:
    consumer-key: ${MPESA_CONSUMER_KEY:your_consumer_key}
    consumer-secret: ${MPESA_CONSUMER_SECRET:your_consumer_secret}
    shortcode: ${MPESA_SHORTCODE:174379}
    passkey: ${MPESA_PASSKEY:your_passkey}
    # STK push callback — must be HTTPS and publicly reachable (use ngrok locally)
    callback-url: ${MPESA_CALLBACK_URL:https://your-domain.com/payments/mpesa/callback}
    environment: ${MPESA_ENV:sandbox}
    # B2C initiator credentials (for disbursements)
    # Set MPESA_INITIATOR_PASSWORD env var in production

# ─── Stripe ───────────────────────────────────────────────────────────────────
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_your_stripe_secret_key}
  # Get this from Stripe Dashboard → Webhooks → your endpoint → Signing secret
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_signing_secret}

# ─── PayPal ───────────────────────────────────────────────────────────────────
paypal:
  client-id: ${PAYPAL_CLIENT_ID:your_paypal_client_id}
  client-secret: ${PAYPAL_CLIENT_SECRET:your_paypal_client_secret}
  environment: ${PAYPAL_ENV:sandbox}   # "sandbox" or "production"

# Frontend URL for CORS
frontend:
  url: ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    "[com.premisave]": DEBUG
    "[org.springframework.data.mongodb]": WARN
    "[org.springframework.data.repository.config.RepositoryConfigurationExtensionSupport]": ERROR
    "[org.springframework.cloud.commons.util.InetUtils]": ERROR